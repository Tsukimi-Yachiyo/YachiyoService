# 通用配置
spring:
  application:
    name: Yachiyo

  # 环境配置
  profiles:
    include: secret
    active: dev

# mybatis-plus 配置
mybatis-plus:
  global-config:
    db-config:
      id-type: assign-id
  configuration:
    map-underscore-to-camel-case: true
  mapper-locations: classpath*:/mapper/**/*.xml
  type-aliases-package: com.yachiyo.entity

# jwt 配置
jwt:
  secret: ${jwt}
  expiration: 3600000
  token-header: "Authorization"
  token-prefix: "Bearer "

# 服务器配置
server:
  tomcat:
    connection-timeout: PT30S
    max-connections: 500
  compression:
    enabled: true
    mime-types: application/json,application/xml,text/html,text/xml,text/plain,text/css,text/javascript,application/javascript
    min-response-size: 10485760
  ssl:
    enabled: false
  forward-headers-strategy: framework