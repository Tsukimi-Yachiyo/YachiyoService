# 开发环境

# spring 配置
spring:
  # 数据库配置
  datasource:
    url: jdbc:postgresql://localhost:5432/yachiyo?currentSchema=public&characterEncoding=utf8
    username: ${postgresql.username}
    password: ${postgresql.password}
    driver-class-name: org.postgresql.Driver

#    url: jdbc:mysql://localhost:3306/yachiyo_chat?useSSL=false&serverTimezone=UTC
#    username: ${mysql.username}
#    password: ${mysql.password}
#    driver-class-name: com.mysql.cj.jdbc.Driver
  # 定时任务配置
  task:
    scheduling:
      pool:
        size: 5
      thread-name-prefix: scheduling-task-
  # 邮箱配置
  mail:
    host: smtp.qq.com
    port: 465
    username: ${email.username}
    password: ${email.password}
    properties:
      mail:
        smtp:
          auth: true
          ssl:
            enable: true
  servlet:
    multipart:
      enabled: true
      max-file-size: 10MB # 单个文件大小限制
      max-request-size: 10MB # 总请求大小限制颜色块
  # 模型配置
  ai:
    vectorstore:
      pgvector:
        initialize-schema: true
        dimensions: 1024
    chat:
      memory:
        repository:
          jdbc:
            initialize-schema: always

#    ollama:
#      chat:
#        options:
#          model: tsukimi-yachiyo
#      embedding:
#        enabled: true
#        model: tsukimi-yachiyo
#      base-url: http://localhost:11434
    openai-sdk:
      api-key: ${openai.api-key}
      base-url: ${openai.base-url}
      chat:
        enabled: true
        options:
          model: qwen-plus
          temperature: 0.7
          top-p: 0.5
      embedding:
        enabled: true
        options:
          model: text-embedding-v3

  # Redis 配置
  redis:
    host: 127.0.0.1
    port: 6379
    password: 123456 # 没有就删掉
    database: 0
    # 连接池
    lettuce:
      pool:
        max-active: 20
        max-idle: 10
        min-idle: 5
        max-wait: 100ms


custom:
  config:
    # 推荐任务间隔
    recommendation:
      interval: "0 0/10 * * * ?" # 每10分钟执行一次
      enable: true # 是否启用推荐任务
      message: "初始配置"

    # 日期调度器间隔
    holiday:
      interval: "0 0 0/24 * * ? "
      enable: true # 是否启用日期调度器
      message: "初始配置"
      holiday:
        url: https://timor.tech/api/holiday/info/{date}


    approved:
      interval: "0 0 0/1 * * ?" # 每1小时执行一次
      enable: true # 是否启用审批任务
      message: "初始配置"

# 服务器配置
server:
  port: 8080

# 日志配置
logging:
  level:
    com.sicau: DEBUG
    org.springframework.jdbc: DEBUG

# 安全配置
security:
  open-api:
    - /api/v1/auth/login
    - /api/v1/auth/register
    - /api/v1/auth/send-code
    - /file/**
    - /api/yachiyo/168/mini/admin/login
    - /api/v1/auth/refresh-token
    - /api/v1/auth/login-by-email
    - /api/v1/auth/change-password

management:
  endpoints:
    web:
      exposure:
        include: refresh